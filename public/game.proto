syntax = "proto3";

service GameGrpc {
  rpc GetAllGames (EmptyRequest) returns (GameList); 
  rpc CreateGame (CreateGameRequest) returns (GameModel);
  rpc UpdateGame (UpdateGameRequest) returns (GameModel); 
  rpc DeleteGame (DeleteRequest) returns (DeleteResponse);
}

message EmptyRequest {}

message GameModel {
  string id = 1;      
  string name = 2;
  string genre = 3;
  int32 price = 4;
  string image_url = 5;
  string platform = 6;
  string description = 7;
  float rating = 8;
}

message CreateGameRequest {
  string name = 1;
  string genre = 2;
  int32 price = 3;
  string image_url = 4;
  string platform = 5;
  string description = 6;
  float rating = 7;
}

message GameList {
  repeated GameModel items = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  bool success = 1;
}

message UpdateGameRequest {
  string id = 1;
  string name = 2;
  string genre = 3;
  int32 price = 4;
  string image_url = 5;
  string platform = 6;
  string description = 7;
  float rating = 8;
}
